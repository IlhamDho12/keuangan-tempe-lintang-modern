    <!-- SPA redirect restore -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === 'p') {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&');
          }).filter(function(s) {
            return s.slice(0, 2) === 'p=';
          })[0];
          if (decoded) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decodeURIComponent(decoded.slice(2)) + l.hash
            );
          }
        }
      }(window.location));
    </script>
