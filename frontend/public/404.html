    <link rel="icon" type="image/png" href="/tempe-lintang.png" />
    <title>Keuangan Tempe Lintang</title>
    <script type="text/javascript">
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) +
        (l.hash ? '&h=' + encodeURIComponent(l.hash.slice(1)) : '')
      );
    </script>
